<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense-Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body{
            background: linear-gradient(135deg, #0f172a, #4c1d95, #be123c, #ea580c, #16a34a, #2563eb);
            min-height: 100vh;
        }

        .glass{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255.0,15)
        }
    </style>
</head>
<body class="text-white p-6">
    <div class="max-w-5xl mx-auto">
        <div class="glass rounded-3xl p-8 shadow-2xl">
            <h1 class="text-5xl font-bold text-center mb-8">
                Expense-Tracker
            </h1>
            <!-- Form -->
             <div class="grid md:grid-cols-4 gap-4">
                <input id="description" type="text"placeholder="Expense Description" class="p-3 rounded-lg text-black">
                <input id="Amnt" type="number" placeholder="Amount in Ksh" class="p-3 rounded-lg text-black" >
                <select id="Expense-cat" class="p-3 rounded-lg text-black" >
                    <option>Food</option> 
                    <option>Transport</option> 
                    <option>Bills</option> 
                    <option>Shopping</option>
                     <option>Entertainment</option>
                </select>
                <button id="addBtn" class="bg-purple-600 hover:bg-purple-700 rounded-lg" > 
                    Add Expense
                 </button>
             </div>
             <!-- Filter -->
              <div class="mt-6">
                <select id="filterCat" class="p-3 rounded-lg text-black w-full" >
                    <option value="All"> All Categories </option>

                    <option value="Food">Food</option> 
                    <option value="Transport">Transport</option> 
                    <option value="Bills">Bills</option> 
                    <option value="Shopping">Shopping</option> 
                    <option value="Entertainment"> Entertainment </option>

                </select>
              </div>
        </div>
    </div>    
</body>
</html>
